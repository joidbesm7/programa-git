<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salida de Vehículo</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

  <header>
    <div class="contenedor-header">
      <h1>Software 3 Verdes</h1>
      <p>Salida de vehículos</p>
    </div>
  </header>

  <nav>
    <a href="index.html">Inicio</a>
    <a href="login.html">Login</a>
    <a href="registro.html">Registro</a>
    <a href="salida.html">Salida</a>
    <a href="consultas.html">Consultas</a>
    <a href="reportes.html">Reportes</a>
  </nav>

  <main>
    <section class="card formulario">
      <h2>Registrar Salida</h2>
      <form onsubmit="return registrarSalida()">
        <label for="placaSalida">Placa</label>
        <input type="text" id="placaSalida" placeholder="Ingrese la placa">

        <label for="horaSalida">Hora de salida</label>
        <input type="time" id="horaSalida">

        <label for="valorPago">Valor a pagar</label>
        <input type="number" id="valorPago" placeholder="Ingrese el valor">

        <button type="submit">Registrar salida</button>
      </form>
    </section>
  </main>

  <footer>
    <p>© 2026 Software 3 Verdes</p>
  </footer>

  <script src="JS/script.js"></script>
</body>
</html>
